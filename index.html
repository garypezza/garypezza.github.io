<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gary Pezza - Apps</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #fff;
        }
        .subtitle {
            color: #888;
            margin-bottom: 3rem;
        }
        .apps {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
        }
        .app-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 2rem;
            width: 280px;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.2s, transform 0.2s;
        }
        .app-card:hover {
            border-color: #444;
            transform: translateY(-2px);
        }
        .app-icon {
            margin-bottom: 1rem;
        }
        .app-icon img {
            width: 64px;
            height: 64px;
            border-radius: 14px;
        }
        .app-card h2 {
            font-size: 1.25rem;
            color: #fff;
            margin-bottom: 0.5rem;
        }
        .app-card p {
            color: #888;
            font-size: 0.9rem;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <h1>Gary Pezza</h1>
    <p class="subtitle">Apps</p>
    <div class="apps">
        <a href="/nearing" class="app-card">
            <div class="app-icon"><img src="nearing-icon.png" alt="Nearing"></div>
            <h2>Nearing</h2>
            <p>Beautiful countdown timers for the moments that matter.</p>
        </a>
    </div>
</body>
</html>
